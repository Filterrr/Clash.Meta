name: Sync Upstream & Patch for FlClash

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_sync:
        description: 'Force sync even if no new upstream commits'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

env:
  UPSTREAM_REPO: MetaCubeX/mihomo
  UPSTREAM_BRANCH: Meta
  TARGET_BRANCH: Meta

jobs:
  sync-and-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git 2>/dev/null || true
          git fetch upstream ${{ env.UPSTREAM_BRANCH }}

      - name: Check for upstream changes
        id: check_changes
        run: |
          LOCAL_HASH=$(git rev-parse HEAD)
          UPSTREAM_HASH=$(git rev-parse upstream/${{ env.UPSTREAM_BRANCH }})

          echo "local_hash=$LOCAL_HASH" >> $GITHUB_OUTPUT
          echo "upstream_hash=$UPSTREAM_HASH" >> $GITHUB_OUTPUT

          if [ "$LOCAL_HASH" = "$UPSTREAM_HASH" ] && [ "${{ github.event.inputs.force_sync }}" != "true" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No new upstream commits detected."
          else
            COMMIT_COUNT=$(git rev-list --count HEAD..upstream/${{ env.UPSTREAM_BRANCH }})
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Found $COMMIT_COUNT new upstream commit(s)."
          fi

      - name: Merge upstream changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git merge upstream/${{ env.UPSTREAM_BRANCH }} --no-edit \
            -m "chore: sync upstream ${{ env.UPSTREAM_REPO }}@${{ steps.check_changes.outputs.upstream_hash }}"

      - name: Write patch script
        run: |
          mkdir -p scripts
          cat > scripts/patch-for-flclash.py << 'PATCH_EOF'
          #!/usr/bin/env python3
          import os
          import re

          REPO_ROOT = os.getcwd()
          os.chdir(REPO_ROOT)

          def read(path):
              with open(path, "r") as f:
                  return f.read()

          def write(path, content):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, "w") as f:
                  f.write(content)

          def patch(path, old, new):
              content = read(path)
              if old not in content:
                  print(f"    WARNING: pattern not found in {path}")
                  return False
              content = content.replace(old, new, 1)
              write(path, content)
              return True

          print("==> [1/8] Replacing CMFA feature flags with Android feature flags")

          for f in ["constant/features/cmfa.go", "constant/features/cmfa_stub.go"]:
              if os.path.exists(f):
                  os.remove(f)
                  print(f"    Removed {f}")

          write("constant/features/android.go", """\
          //go:build android

          package features

          const Android = true
          """)
          print("    Created constant/features/android.go")

          write("constant/features/android_stub.go", """\
          //go:build !android

          package features

          const Android = false
          """)
          print("    Created constant/features/android_stub.go")

          print("==> [2/8] Replacing features.CMFA references with features.Android")

          patch("component/loopback/detector.go", "features.CMFA", "features.Android")
          print("    Patched component/loopback/detector.go")

          patch("tunnel/tunnel.go", "features.CMFA", "features.Android")
          print("    Patched tunnel/tunnel.go")

          patch("constant/path.go", "features.CMFA", "features.Android")
          print("    Patched constant/path.go")

          print("==> [3/8] Updating build tags from 'android && cmfa' to 'android'")

          patch("dns/patch_android.go", "//go:build android && cmfa", "//go:build android")
          print("    Patched dns/patch_android.go build tag")

          patch("hub/route/patch_android.go", "//go:build android && cmfa", "//go:build android")
          print("    Patched hub/route/patch_android.go build tag")

          patch("dns/system_common.go", "//go:build !(android && cmfa)", "//go:build !android")
          print("    Patched dns/system_common.go build tag")

          print("==> [4/8] Replacing upstream CMFA-specific files with FlClash versions")

          if os.path.exists("listener/sing_tun/server_notandroid.go"):
              os.remove("listener/sing_tun/server_notandroid.go")
              print("    Removed listener/sing_tun/server_notandroid.go")

          write("listener/sing_tun/server_android.go", """\
          //go:build android

          package sing_tun

          import (
          \ttun "github.com/metacubex/sing-tun"
          )

          func (l *Listener) buildAndroidRules(tunOptions *tun.Options) error {
          \treturn nil
          }
          """)
          print("    Rewrote listener/sing_tun/server_android.go")

          content = read("listener/sing_tun/server.go")
          content = re.sub(r'\n\terr = l\.buildAndroidRules\(&tunOptions\)\n\tif err != nil \{\n\t\terr = E\.Cause\(err, "build android rules"\)\n\t\treturn\n\t\}', '', content)
          content = content.replace('\t}\n\n\ttunIf, err := tunNew(tunOptions)', '\t}\n\ttunIf, err := tunNew(tunOptions)')
          write("listener/sing_tun/server.go", content)
          print("    Removed buildAndroidRules call from listener/sing_tun/server.go")

          print("==> [5/8] Patching constant/path.go for geo filename variants and Android flag")

          patch("constant/path.go",
                'strings.EqualFold(fi.Name(), "geoip.metadb") {',
                'strings.EqualFold(fi.Name(), "geoip.metadb") ||\n\t\t\t\tstrings.EqualFold(fi.Name(), "GEOIP.metadb") {')

          patch("constant/path.go",
                'strings.EqualFold(fi.Name(), "GeoIP.dat") {',
                'strings.EqualFold(fi.Name(), "GeoIP.dat") ||\n\t\t\t\tstrings.EqualFold(fi.Name(), "GEOIP.dat") {')

          patch("constant/path.go",
                'strings.EqualFold(fi.Name(), "GeoSite.dat") {',
                'strings.EqualFold(fi.Name(), "GeoSite.dat") ||\n\t\t\t\tstrings.EqualFold(fi.Name(), "GEOSITE.dat") {')
          print("    Patched constant/path.go (added uppercase geo filename variants)")

          print("==> [6/8] Patching upstream source files for FlClash adaptation")

          content = read("component/process/process.go")
          content = content.replace("// PackageNameResolver\n", "")
          content = content.replace("// never change type traits because it's used in CMFA", "// never change type traits because it's used in CFMA")
          content = content.replace("// never change type traits because it's used in CFMA\ntype PackageNameResolver", "type PackageNameResolver")
          write("component/process/process.go", content)
          print("    Reverted process.go upstream changes (CMFA -> CFMA typo, removed duplicate comment)")

          content = read("constant/features/tags.go")
          content = re.sub(r'\n\tif CMFA \{\n\t\ttags = append\(tags, "cmfa"\)\n\t\}\n', '\n', content)
          write("constant/features/tags.go", content)
          print("    Removed CMFA tag block from constant/features/tags.go")

          content = read("constant/adapters.go")
          content = re.sub(r'\n\tDefaultTestURL\s+= "https://www\.gstatic\.com/generate_204"\n', '\n', content)
          if 'var DefaultTestURL = "https://www.gstatic.com/generate_204"' not in content:
              content = content.replace(
                  '\tDefaultDropTime   = 12 * DefaultTCPTimeout\n\tDefaultTLSTimeout = DefaultTCPTimeout\n)',
                  '\tDefaultDropTime   = 12 * DefaultTCPTimeout\n\tDefaultTLSTimeout = DefaultTCPTimeout\n)\n\nvar DefaultTestURL = "https://www.gstatic.com/generate_204"')
          write("constant/adapters.go", content)
          print("    Fixed DefaultTestURL in constant/adapters.go")

          patch("component/resource/fetcher.go",
                'log.Errorln("[Provider]',
                'log.Warnln("[Provider]')
          print("    Patched component/resource/fetcher.go (Errorln -> Warnln)")

          content = read("hub/executor/executor.go")
          content = content.replace(
              'log.Errorln("initial proxy provider',
              'log.Warnln("initial proxy provider')
          content = content.replace(
              'log.Errorln("initial rule provider',
              'log.Warnln("initial rule provider')
          content = content.replace(
              '\tupdateListeners(cfg.General, cfg.Listeners, force)',
              '\t//updateListeners(cfg.General, cfg.Listeners, force)')
          content = content.replace(
              '\tupdateTun(cfg.General) // tun should not care "force"',
              '\t//updateTun(cfg.General) // tun should not care "force"')
          write("hub/executor/executor.go", content)

          content = read("hub/executor/executor.go")
          old_provider_block = """\t\t\t\tlog.Warnln("initial rule provider %s error: %v", name, err)
          \t\t\t\t}
          \t\t\t}
          \t\t}
          \t}

          \twg := sync.WaitGroup{}"""
          new_provider_block = """\t\t\t\tlog.Warnln("initial rule provider %s error: %v", name, err)
          \t\t\t\t}
          \t\t\t}
          \t\t} else {
          \t\t\tif DefaultProviderLoadedHook != nil {
          \t\t\t\tDefaultProviderLoadedHook(name)
          \t\t\t}
          \t\t}
          \t}

          \twg := sync.WaitGroup{}"""
          content = content.replace(old_provider_block, new_provider_block)
          write("hub/executor/executor.go", content)
          print("    Patched hub/executor/executor.go")

          content = read("hub/executor/executor.go")
          content = re.sub(r'\n\twg\.Wait\(\)\n', '\n', content)
          write("hub/executor/executor.go", content)
          print("    Removed wg.Wait() from hub/executor/executor.go")

          content = read("hub/route/server.go")
          content = content.replace(
              '\t\tif err = server.Serve(l); err != nil {\n\t\t\tlog.Errorln("External controller serve error: %s", err)\n\t\t}',
              '\t\t_ = server.Serve(l)')
          write("hub/route/server.go", content)
          print("    Patched hub/route/server.go (ignore Serve error)")

          content = read("listener/listener.go")
          content = content.replace(
              '\tif tunConf.Equal(LastTunConf) {\n\t\tif tunLister != nil { // some default value in dialer maybe changed when config reload, reset at here\n\t\t\ttunLister.OnReload()\n\t\t}',
              '\tif tunLister != nil && tunConf.Equal(LastTunConf) {\n\t\ttunLister.OnReload()')
          write("listener/listener.go", content)
          print("    Patched listener/listener.go (tunLister nil check reorder)")

          print("==> [7/8] Creating FlClash-specific patch files")

          write("adapter/patch.go", """\
          package adapter

          type UrlTestCheck func(url string, name string, delay uint16)

          var UrlTestHook UrlTestCheck
          """)
          print("    Created adapter/patch.go")

          content = read("adapter/adapter.go")
          content = content.replace(
              '\tdefer func() {\n\t\talive := err == nil',
              '\tdefer func() {\n\t\tif UrlTestHook != nil {\n\t\t\tUrlTestHook(url, p.Name(), t)\n\t\t}\n\n\t\talive := err == nil')
          write("adapter/adapter.go", content)
          print("    Patched adapter/adapter.go (added UrlTestHook call in defer)")

          write("adapter/provider/patch.go", """\
          package provider

          func (pp *proxySetProvider) GetSubscriptionInfo() *SubscriptionInfo {
          \treturn pp.subscriptionInfo
          }
          """)
          print("    Created adapter/provider/patch.go")

          write("component/updater/patch.go", """\
          package updater

          import (
          \t"fmt"
          \t"github.com/metacubex/mihomo/component/geodata"
          \t"github.com/metacubex/mihomo/component/mmdb"
          \t"github.com/oschwald/maxminddb-golang"
          )

          func UpdateMMDBWithPath(path string) (err error) {
          \tdefer mmdb.ReloadIP()
          \tdata, err := downloadForBytes(geodata.MmdbUrl())
          \tif err != nil {
          \t\treturn fmt.Errorf("can't download MMDB database file: %w", err)
          \t}
          \tinstance, err := maxminddb.FromBytes(data)
          \tif err != nil {
          \t\treturn fmt.Errorf("invalid MMDB database file: %s", err)
          \t}
          \t_ = instance.Close()

          \tmmdb.IPInstance().Reader.Close()
          \tif err = saveFile(data, path); err != nil {
          \t\treturn fmt.Errorf("can't save MMDB database file: %w", err)
          \t}
          \treturn nil
          }

          func UpdateASNWithPath(path string) (err error) {
          \tdefer mmdb.ReloadASN()
          \tdata, err := downloadForBytes(geodata.ASNUrl())
          \tif err != nil {
          \t\treturn fmt.Errorf("can't download ASN database file: %w", err)
          \t}

          \tinstance, err := maxminddb.FromBytes(data)
          \tif err != nil {
          \t\treturn fmt.Errorf("invalid ASN database file: %s", err)
          \t}
          \t_ = instance.Close()

          \tmmdb.ASNInstance().Reader.Close()
          \tif err = saveFile(data, path); err != nil {
          \t\treturn fmt.Errorf("can't save ASN database file: %w", err)
          \t}
          \treturn nil
          }

          func UpdateGeoIpWithPath(path string) (err error) {
          \tgeoLoader, err := geodata.GetGeoDataLoader("standard")
          \tdata, err := downloadForBytes(geodata.GeoIpUrl())
          \tif err != nil {
          \t\treturn fmt.Errorf("can't download GeoIP database file: %w", err)
          \t}
          \tif _, err = geoLoader.LoadIPByBytes(data, "cn"); err != nil {
          \t\treturn fmt.Errorf("invalid GeoIP database file: %s", err)
          \t}
          \tif err = saveFile(data, path); err != nil {
          \t\treturn fmt.Errorf("can't save GeoIP database file: %w", err)
          \t}
          \treturn nil
          }

          func UpdateGeoSiteWithPath(path string) (err error) {
          \tgeoLoader, err := geodata.GetGeoDataLoader("standard")
          \tdata, err := downloadForBytes(geodata.GeoSiteUrl())
          \tif err != nil {
          \t\treturn fmt.Errorf("can't download GeoSite database file: %w", err)
          \t}

          \tif _, err = geoLoader.LoadSiteByBytes(data, "cn"); err != nil {
          \t\treturn fmt.Errorf("invalid GeoSite database file: %s", err)
          \t}

          \tif err = saveFile(data, path); err != nil {
          \t\treturn fmt.Errorf("can't save GeoSite database file: %w", err)
          \t}
          \treturn nil
          }
          """)
          print("    Created component/updater/patch.go")

          write("config/patch.go", """\
          package config

          import "sync"

          var (
          \tproxyNameList   []string
          \tproxyNameListMu sync.RWMutex
          )

          func GetProxyNameList() []string {
          \tproxyNameListMu.RLock()
          \tdefer proxyNameListMu.RUnlock()
          \treturn proxyNameList
          }

          func SetProxyNameList(list []string) {
          \tproxyNameListMu.Lock()
          \tdefer proxyNameListMu.Unlock()
          \tproxyNameList = list
          }
          """)
          print("    Created config/patch.go")

          content = read("config/config.go")
          content = content.replace(
              '\treturn proxies, providersMap, nil',
              '\tSetProxyNameList(proxyList)\n\treturn proxies, providersMap, nil')
          write("config/config.go", content)
          print("    Patched config/config.go (added SetProxyNameList call)")

          write("hub/executor/patch.go", """\
          package executor

          type ProviderLoadedHook func(providerName string)

          var DefaultProviderLoadedHook ProviderLoadedHook
          """)
          print("    Created hub/executor/patch.go")

          write("listener/patch.go", """\
          package listener

          func StopListener() {

          \tif socksListener != nil {
          \t\t_ = socksListener.Close()
          \t\tsocksListener = nil
          \t}

          \tif socksUDPListener != nil {
          \t\t_ = socksUDPListener.Close()
          \t\tsocksUDPListener = nil
          \t}

          \tif httpListener != nil {
          \t\t_ = httpListener.Close()
          \t\thttpListener = nil
          \t}

          \tif redirListener != nil {
          \t\t_ = redirListener.Close()
          \t\tredirListener = nil
          \t}

          \tif redirUDPListener != nil {
          \t\t_ = redirUDPListener.Close()
          \t\tredirUDPListener = nil
          \t}

          \tif tproxyListener != nil {
          \t\t_ = tproxyListener.Close()
          \t\ttproxyListener = nil
          \t}

          \tif tproxyUDPListener != nil {
          \t\t_ = tproxyUDPListener.Close()
          \t\ttproxyUDPListener = nil
          \t}

          \tif mixedListener != nil {
          \t\t_ = mixedListener.Close()
          \t\tmixedListener = nil
          \t}

          \tif mixedUDPLister != nil {
          \t\t_ = mixedUDPLister.Close()
          \t\tmixedUDPLister = nil
          \t}

          \tif tunLister != nil {
          \t\t_ = tunLister.Close()
          \t\ttunLister = nil
          \t}

          \tif shadowSocksListener != nil {
          \t\t_ = shadowSocksListener.Close()
          \t\tshadowSocksListener = nil
          \t}

          \tif shadowSocksListener != nil {
          \t\t_ = shadowSocksListener.Close()
          \t\tshadowSocksListener = nil
          \t}

          \tif vmessListener != nil {
          \t\t_ = vmessListener.Close()
          \t\tvmessListener = nil
          \t}

          \tif tuicListener != nil {
          \t\t_ = tuicListener.Close()
          \t\ttuicListener = nil
          \t}
          }
          """)
          print("    Created listener/patch.go")

          write("tunnel/patch.go", """\
          package tunnel

          import (
          \tC "github.com/metacubex/mihomo/constant"
          \tP "github.com/metacubex/mihomo/constant/provider"
          )

          var (
          \tallProxies = make(map[string]C.Proxy)
          )

          func AllProxies() map[string]C.Proxy {
          \treturn proxiesWithProviders()
          }

          // UpdateAllProxies The provider requires runtime sync
          func UpdateAllProxies(proxies map[string]C.Proxy, providers map[string]P.ProxyProvider) {
          \tvar allProxiesTemp = make(map[string]C.Proxy)
          \tfor name, proxy := range proxies {
          \t\tallProxiesTemp[name] = proxy
          \t}
          \tfor _, p := range providers {
          \t\tfor _, proxy := range p.Proxies() {
          \t\t\tname := proxy.Name()
          \t\t\tallProxiesTemp[name] = proxy
          \t\t}
          \t}
          \tallProxies = allProxiesTemp
          }

          func proxiesWithProviders() map[string]C.Proxy {
          \tap := make(map[string]C.Proxy)
          \tfor name, proxy := range Proxies() {
          \t\tap[name] = proxy
          \t}
          \tfor _, p := range Providers() {
          \t\tfor _, proxy := range p.Proxies() {
          \t\t\tname := proxy.Name()
          \t\t\tap[name] = proxy
          \t\t}
          \t}
          \treturn ap
          }
          """)
          print("    Created tunnel/patch.go")

          content = read("tunnel/tunnel.go")
          content = content.replace(
              '\tproviders = newProviders\n\tconfigMux.Unlock()',
              '\tproviders = newProviders\n\tUpdateAllProxies(newProxies, newProviders)\n\tconfigMux.Unlock()')
          write("tunnel/tunnel.go", content)
          print("    Patched tunnel/tunnel.go (added UpdateAllProxies call)")

          write("tunnel/statistic/patch.go", """\
          package statistic

          type RequestNotify func(c Tracker)

          var DefaultRequestNotify RequestNotify

          func (m *Manager) TotalTraffic(onlyProxy bool) (up, down int64) {
          \tif onlyProxy {
          \t\treturn m.proxyUploadTotal.Load(), m.proxyDownloadTotal.Load()
          \t}
          \treturn m.uploadTotal.Load(), m.downloadTotal.Load()
          }

          func (m *Manager) NowTraffic(onlyProxy bool) (up, down int64) {
          \tif onlyProxy {
          \t\treturn m.proxyUploadBlip.Load(), m.proxyDownloadBlip.Load()
          \t}
          \treturn m.uploadBlip.Load(), m.downloadBlip.Load()
          }
          """)
          print("    Created tunnel/statistic/patch.go")

          write("tunnel/statistic/patch_android.go", """\
          //go:build android

          package statistic
          """)
          print("    Created tunnel/statistic/patch_android.go")

          write("listener/http/patch_android.go", """\
          //go:build android

          package http

          import "net"

          func (l *Listener) Listener() net.Listener {
          \treturn l.listener
          }
          """)
          print("    Created listener/http/patch_android.go")

          write("rules/provider/patch_android.go", """\
          //go:build android

          package provider

          import "time"

          var (
          \tsuspended bool
          )

          type UpdatableProvider interface {
          \tUpdatedAt() time.Time
          }

          func Suspend(s bool) {
          \tsuspended = s
          }
          """)
          print("    Created rules/provider/patch_android.go")

          print("==> [8/8] Patching traffic statistics for proxy-only tracking")

          content = read("tunnel/statistic/manager.go")
          content = content.replace(
              '\tconnections   xsync.Map[string, Tracker]\n\tuploadTemp    atomic.Int64\n\tdownloadTemp  atomic.Int64\n\tuploadBlip    atomic.Int64\n\tdownloadBlip  atomic.Int64\n\tuploadTotal   atomic.Int64\n\tdownloadTotal atomic.Int64\n\tpid           int32\n\tmemory        uint64',
              '\tconnections        xsync.Map[string, Tracker]\n\tuploadTemp         atomic.Int64\n\tdownloadTemp       atomic.Int64\n\tuploadBlip         atomic.Int64\n\tdownloadBlip       atomic.Int64\n\tuploadTotal        atomic.Int64\n\tdownloadTotal      atomic.Int64\n\tproxyUploadTemp    atomic.Int64\n\tproxyDownloadTemp  atomic.Int64\n\tproxyUploadBlip    atomic.Int64\n\tproxyDownloadBlip  atomic.Int64\n\tproxyUploadTotal   atomic.Int64\n\tproxyDownloadTotal atomic.Int64\n\tpid                int32\n\tmemory             uint64')
          content = content.replace(
              'func (m *Manager) Join(c Tracker) {\n\tm.connections.Store(c.ID(), c)',
              'func (m *Manager) Join(c Tracker) {\n\tif DefaultRequestNotify != nil {\n\t\tDefaultRequestNotify(c)\n\t}\n\tm.connections.Store(c.ID(), c)')
          content = content.replace(
              'func (m *Manager) PushUploaded(size int64) {\n\tm.uploadTemp.Add(size)\n\tm.uploadTotal.Add(size)',
              'func (m *Manager) PushUploaded(lastChain string, size int64) {\n\tif lastChain != "DIRECT" {\n\t\tm.proxyUploadTemp.Add(size)\n\t\tm.proxyUploadTotal.Add(size)\n\t}\n\tm.uploadTemp.Add(size)\n\tm.uploadTotal.Add(size)')
          content = content.replace(
              'func (m *Manager) PushDownloaded(size int64) {\n\tm.downloadTemp.Add(size)\n\tm.downloadTotal.Add(size)',
              'func (m *Manager) PushDownloaded(lastChain string, size int64) {\n\tif lastChain != "DIRECT" {\n\t\tm.proxyDownloadTemp.Add(size)\n\t\tm.proxyDownloadTotal.Add(size)\n\t}\n\tm.downloadTemp.Add(size)\n\tm.downloadTotal.Add(size)')
          content = content.replace(
              '\tm.downloadTotal.Store(0)\n}',
              '\tm.downloadTotal.Store(0)\n\n\tm.proxyUploadTemp.Store(0)\n\tm.proxyUploadBlip.Store(0)\n\tm.proxyUploadTotal.Store(0)\n\tm.proxyDownloadTemp.Store(0)\n\tm.proxyDownloadBlip.Store(0)\n\tm.proxyDownloadTotal.Store(0)\n\n}')
          content = content.replace(
              '\t\tm.downloadBlip.Store(m.downloadTemp.Swap(0))\n\t}',
              '\t\tm.downloadBlip.Store(m.downloadTemp.Swap(0))\n\t\tm.proxyUploadBlip.Store(m.proxyUploadTemp.Swap(0))\n\t\tm.proxyDownloadBlip.Store(m.proxyDownloadTemp.Swap(0))\n\t}')
          write("tunnel/statistic/manager.go", content)
          print("    Patched tunnel/statistic/manager.go")

          content = read("tunnel/statistic/tracker.go")
          content = content.replace(
              'tt.manager.PushDownloaded(download)',
              'tt.manager.PushDownloaded(tt.Conn.Chains().Last(), download)', 1)
          content = content.replace(
              'tt.manager.PushDownloaded(download)',
              'tt.manager.PushDownloaded(tt.Chains().Last(), download)')
          content = content.replace(
              'tt.manager.PushUploaded(upload)',
              'tt.manager.PushUploaded(tt.Chains().Last(), upload)')
          content = content.replace(
              'ut.manager.PushDownloaded(download)',
